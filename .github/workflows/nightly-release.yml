name: Nightly Release

on:
  push:
    branches: ['main']

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            binary_name: creeper
            asset_name: creeper-linux-x64

          - os: ubuntu-26.04-arm
            binary_name: creeper
            asset_name: creeper-linux-arm64

          - os: windows-latest
            binary_name: creeper.exe
            asset_name: creeper-windows-x64.exe

          - os: windows-11-arm
            binary_name: creeper.exe
            asset_name: creeper-windows-arm64.exe

          - os: macos-latest
            binary_name: creeper
            asset_name: creeper-macos-arm64

          - os: macos-26-intel
            binary_name: creeper
            asset_name: creeper-macos-intel

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable

      - name: Build release binary
        run: cargo build --release

      - name: Package release asset
        shell: bash
        run: |
          mkdir -p dist
          cp "target/release/${{ matrix.binary_name }}" "dist/${{ matrix.asset_name }}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.asset_name }}

  publish:
    needs: build

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: actions/download-artifact@v8
        with:
          path: release-artifacts
          pattern: creeper-*
          merge-multiple: true

      - name: Read release version
        id: meta
        shell: bash
        run: |
          version=$(grep -m1 '^version = ' Cargo.toml | sed -E 's/^version = "([^"]+)"$/\1/')
          short_sha=${GITHUB_SHA::7}
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "short_sha=$short_sha" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: ${{ steps.meta.outputs.version }}+build.${{ steps.meta.outputs.short_sha }}
          prerelease: true
          files: release-artifacts/*
